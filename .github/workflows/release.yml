name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: risus-linux-x86_64
            binary: dist/risus
          - os: macos-latest
            artifact: risus-macos-arm64
            binary: dist/risus
          - os: windows-latest
            artifact: risus-windows-x86_64.exe
            binary: dist/risus.exe

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[client]" pyinstaller>=6

      - name: Build binary
        run: python -m PyInstaller build/risus.spec

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: mv dist/risus dist/${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: Rename-Item dist\risus.exe ${{ matrix.artifact }}
        shell: pwsh

      - name: Compute checksum (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Compute checksum (Windows)
        if: runner.os == 'Windows'
        run: |
          $hash = (Get-FileHash dist\${{ matrix.artifact }} -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}" | Out-File -FilePath dist\${{ matrix.artifact }}.sha256 -Encoding ascii
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release-assets/*
            risus.cfg.example
