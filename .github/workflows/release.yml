name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build & Sign (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: risus-linux-x86_64
            binary: dist/risus
          - os: macos-latest
            artifact: risus-macos-arm64
            binary: dist/risus
          - os: windows-latest
            artifact: risus-windows-x86_64.exe
            binary: dist/risus.exe

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[client]" pyinstaller>=6

      - name: Build binary
        run: python -m PyInstaller build/risus.spec

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: mv dist/risus dist/${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: Rename-Item dist\risus.exe ${{ matrix.artifact }}
        shell: pwsh

      - name: Import signing certificate
        if: runner.os == 'macOS'
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Sign binary
        if: runner.os == 'macOS'
        run: |
          codesign --force --verbose --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --options=runtime --no-strict \
            --entitlements build/entitlements.plist \
            dist/risus-macos-arm64
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      - name: Package signed binary
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent dist/risus-macos-arm64 dist/risus-macos-arm64.zip

      - name: Notarize
        if: runner.os == 'macOS'
        timeout-minutes: 15
        run: |
          echo "$APPLE_API_KEY_CONTENT" | base64 --decode > /tmp/apple_api_key.p8
          xcrun notarytool submit dist/risus-macos-arm64.zip \
            --wait \
            --key /tmp/apple_api_key.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID"
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}

      - name: Clean up API key
        if: always() && runner.os == 'macOS'
        run: rm -f /tmp/apple_api_key.p8

      - name: Verify signature
        if: runner.os == 'macOS'
        run: codesign --verify --deep --strict --verbose=2 dist/risus-macos-arm64

      - name: Compute checksum (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          sha256sum risus-macos-arm64.zip > risus-macos-arm64.zip.sha256

      - name: Compute checksum (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Compute checksum (Windows)
        if: runner.os == 'Windows'
        run: |
          $hash = (Get-FileHash dist\${{ matrix.artifact }} -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}" | Out-File -FilePath dist\${{ matrix.artifact }}.sha256 -Encoding ascii
        shell: pwsh

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/risus-macos-arm64.zip
            dist/risus-macos-arm64.zip.sha256

      - name: Upload artifact
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release-assets/*
            risus.cfg.example
