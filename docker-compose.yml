services:
  db:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: risus
      POSTGRES_PASSWORD: risus
      POSTGRES_DB: risus
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "risus"]
      interval: 2s
      timeout: 3s
      retries: 20

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    environment:
      DATABASE_URL: postgresql://risus:risus@db:5432/risus
      RISUS_TOKEN: ${RISUS_TOKEN}
    ports:
      - "127.0.0.1:8765:8765"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8765/healthz').status==200 else 1)"]
      interval: 2s
      timeout: 3s
      retries: 20

  caddy:
    image: docker.io/library/caddy:2
    network_mode: host
    profiles:
      - production
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    restart: unless-stopped

volumes:
  dbdata: {}
  caddy_data: {}
